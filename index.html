<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huzaifa Graphics Studio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-col-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .control-group {
            margin-bottom: 15px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        select, input[type="file"], input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .canvas-wrapper {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            overflow: auto;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
        .btn-text {
            background-color: #007bff;
            margin-top: 5px;
        }
        .btn-text:hover {
            background-color: #0069d9;
        }
    </style>
    <!-- Fabric.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Huzaifa Graphics Studio</h1>

    <!-- 1. NEW SIZE OPTION -->
    <div class="control-group">
        <label>۱. ڈیزائن کا سائز منتخب کریں:</label>
        <select id="sizeSelect" onchange="changeCanvasSize(this.value)">
            <option value="1:1">Instagram / Square Post (1:1)</option>
            <option value="16:9">YouTube Thumbnail (16:9)</option>
            <option value="9:16">TikTok / WhatsApp Status (9:16)</option>
            <option value="facebook">Facebook Post</option>
        </select>
    </div>

    <!-- 2. SELECT FRAME -->
    <div class="control-group">
        <label>۲. فریم منتخب کریں:</label>
        <select id="templateSelect" onchange="loadTemplate(this.value)">
            <option value="">-- کوئی فریم چنیں --</option>
        </select>
    </div>

    <!-- 3. UPLOAD PHOTO -->
    <div class="control-group">
        <label>۳. اپنی تصویر اپلوڈ کریں:</label>
        <input type="file" id="userPhotoInput" accept="image/*">
    </div>

    <!-- CANVAS AREA -->
    <div class="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>

    <!-- 4. ADD TEXT -->
    <div class="control-group">
        <label>۴. نام لکھیں:</label>
        <input type="text" id="textInput" placeholder="یہاں اپنا نام لکھیں...">
        <button class="btn-text" onclick="addCustomText()">نام شامل کریں</button>
    </div>

    <!-- DOWNLOAD DESIGN -->
    <button onclick="downloadDesign()">📥 تیار ڈیزائن ڈاؤن لوڈ کریں</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // === FIREBASE CONFIGURATION ===
    const firebaseConfig = {
        databaseURL: "https://huzaifa-graphics-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // === CANVAS INITIALIZATION ===
    const canvas = new fabric.Canvas('mainCanvas', {
        width: 500,
        height: 500,
        preserveObjectStacking: true
    });

    // Function to Change Canvas Size
    function changeCanvasSize(value) {
        let w = 500, h = 500;
        
        if (value === "16:9") {
            w = 533; h = 300; // YouTube Thumbnail Size Fit
        } else if (value === "9:16") {
            w = 300; h = 533; // Portrait Status Size Fit
        } else if (value === "facebook") {
            w = 533; h = 280; // Facebook Post Size Fit
        } else {
            w = 500; h = 500; // Default Square 1:1
        }
        
        canvas.setWidth(w);
        canvas.setHeight(h);
        canvas.renderAll();
    }

    // Load Dynamic Templates from Firebase
    db.ref('templates').on('value', (snapshot) => {
        const select = document.getElementById('templateSelect');
        select.innerHTML = '<option value="">-- کوئی فریم چنیں --</option>';
        snapshot.forEach((child) => {
            const data = child.val();
            const opt = document.createElement('option');
            opt.value = data.url;
            opt.innerText = data.name || "خوبصورت فریم";
            select.appendChild(opt);
        });
    });

    // Load Chosen Template onto Canvas
    function loadTemplate(url) {
        if(!url) return;
        fabric.Image.fromURL(url, function(img) {
            img.set({
                scaleX: canvas.width / img.width,
                scaleY: canvas.height / img.height,
                selectable: true
            });
            canvas.add(img);
            canvas.sendToBack(img);
            canvas.renderAll();
        }, { crossOrigin: 'anonymous' });
    }

    // Handle User Photo Upload
    document.getElementById('userPhotoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(f) {
            fabric.Image.fromURL(f.target.result, function(img) {
                img.scaleToWidth(canvas.width * 0.5);
                img.set({
                    left: 50,
                    top: 50,
                    selectable: true
                });
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
            });
        };
        reader.readAsDataURL(file);
    });

    // Add Custom Text
    function addCustomText() {
        const textVal = document.getElementById('textInput').value || "Huzaifa Studio";
        const text = new fabric.IText(textVal, {
            left: 50,
            top: canvas.height - 80,
            fontFamily: 'Arial',
            fill: '#000000',
            fontSize: 28,
            selectable: true
        });
        canvas.add(text);
        canvas.setActiveObject(text);
        canvas.renderAll();
    }

    // Download Design
    function downloadDesign() {
        canvas.discardActiveObject();
        canvas.requestRenderAll();
        setTimeout(() => {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1.0 });
            const link = document.createElement('a');
            link.download = 'Huzaifa-Graphics-Design.png';
            link.href = dataURL;
            link.click();
        }, 100);
    }
</script>

</body>
</html>
