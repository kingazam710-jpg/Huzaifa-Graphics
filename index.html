<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huzaifa Graphics Studio Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/jameel-noori-nastaleeq" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #0c0a14; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: linear-gradient(135deg, #8a2be2, #4a00e0); padding: 12px; text-align: center; font-weight: 700; font-size: 16px; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Main Workspace */
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; background-color: #120f24; padding: 10px; justify-content: center; align-items: center; }
        .canvas-holder { box-shadow: 0px 10px 30px rgba(0,0,0,0.7); border-radius: 12px; overflow: hidden; border: 2px solid #3d346d; background-color: #1a1633; }

        /* Modern Dynamic Bottom Panel */
        .control-panel { background-color: #151226; border-top: 2px solid #2d2654; padding: 10px 0; display: flex; flex-direction: column; gap: 8px; width: 100%; position: relative; }
        
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #a29bfe; padding: 0 15px; font-weight: 600; }
        
        /* Templates Row */
        .templates-row { display: flex; gap: 10px; overflow-x: auto; padding: 0 15px; scrollbar-width: none; min-height: 65px; }
        .templates-row::-webkit-scrollbar { display: none; }
        .template-card { width: 60px; height: 60px; background-size: cover; background-position: center; border-radius: 8px; flex-shrink: 0; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .template-card:hover { border-color: #00ffd1; }

        /* Smart Contextual Menu (بدلنے والا مینو) */
        .context-menu { background: #1c1736; margin: 0 15px; padding: 10px; border-radius: 10px; border: 1px solid #3d346d; display: none; gap: 10px; align-items: center; justify-content: space-around; min-height: 55px; }
        .context-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; cursor: pointer; min-width: 50px; }
        .context-btn i { font-size: 16px; color: #00ffd1; background: #221d45; padding: 8px; border-radius: 50%; width: 34px; height: 34px; display: flex; justify-content: center; align-items: center; }
        
        .input-box-active { flex: 1; background: #120f24; border: 1px solid #4a00e0; padding: 8px; border-radius: 6px; color: white; font-size: 12px; outline: none; }
        .font-style-active { background: #8a2be2; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 12px; }

        /* Layers Panel Slider */
        .layers-trigger { position: absolute; right: 15px; top: 15px; background: #8a2be2; border: none; color: white; padding: 8px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; z-index: 99; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .layers-panel { position: absolute; right: -250px; top: 60px; width: 220px; background: #151226; border: 1px solid #3d346d; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 98; transition: 0.3s; box-shadow: -5px 5px 15px rgba(0,0,0,0.5); }
        .layers-panel.active { right: 15px; }
        .layer-item { display: flex; justify-content: space-between; align-items: center; background: #1c1736; padding: 6px 10px; border-radius: 6px; font-size: 11px; }
        .layer-controls { display: flex; gap: 10px; }
        .layer-icon-btn { background: none; border: none; color: #b2bec3; cursor: pointer; font-size: 12px; }
        .layer-icon-btn.active { color: #ff7675; }

        /* Main Base Dock Buttons */
        .base-toolbar { display: flex; gap: 15px; overflow-x: auto; padding: 5px 15px; scrollbar-width: none; border-top: 1px solid #1c1736; }
        .base-toolbar::-webkit-scrollbar { display: none; }
        .main-dock-btn { display: flex; flex-direction: column; align-items: center; background: none; border: none; color: #b2bec3; font-size: 11px; cursor: pointer; min-width: 65px; gap: 4px; }
        .main-dock-btn i { font-size: 16px; color: white; background: #1c1736; padding: 10px; border-radius: 12px; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; }
        
        .color-picker-wrapper { position: relative; }
        .hidden-color { position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }
        #hidden-photo-loader { display: none; }
    </style>
</head>
<body>

    <header><i class="fa-solid fa-wand-magic-sparkles"></i> HG Studio Pro</header>

    <div class="main-container">
        <button class="layers-trigger" onclick="toggleLayersPanel()"><i class="fa-solid fa-layer-group"></i> Layers</button>
        
        <div class="layers-panel" id="layersPanel">
            <h4 style="font-size: 11px; color:#a29bfe; border-bottom:1px solid #3d346d; padding-bottom:4px;">Object Layers</h4>
            <div id="layers-list-container" style="display:flex; flex-direction:column; gap:5px;"></div>
        </div>

        <div class="canvas-holder">
            <canvas id="main-canvas" width="340" height="340"></canvas>
        </div>
    </div>

    <div class="control-panel">
        
        <div class="context-menu" id="smartMenu"></div>

        <div id="templates-section-area">
            <div class="section-title">Select Background Template</div>
            <div class="templates-row" id="firebase-templates"></div>
        </div>

        <div class="base-toolbar">
            <button class="main-dock-btn" onclick="addCustomText()"><i class="fa-solid fa-t"></i><span>Add Text</span></button>
            <label for="hidden-photo-loader" class="main-dock-btn"><i class="fa-solid fa-image"></i><span>Add Photo</span></label>
            <input type="file" id="hidden-photo-loader" accept="image/*">
            <button class="main-dock-btn" onclick="downloadMasterImage()" style="color: #00ffd1;"><i class="fa-solid fa-circle-down" style="background:#00adb5; color:white;"></i><span>Save HD</span></button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // فائر بیس فری کنفیگریشن
        const firebaseConfig = { databaseURL: "https://huzaifa-graphics-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = new fabric.Canvas('main-canvas');
        const smartMenu = document.getElementById('smartMenu');
        const templatesSection = document.getElementById('templates-section-area');

        // ابتدائی تین ٹیکسٹ لائیو ایڈ کرنا (تاکہ گاہک الگ الگ کلک کر سکے)
        function createSampleText(text, top, size) {
            return new fabric.Text(text, {
                left: 40, top: top, fontFamily: "'Jameel Noori Nastaleeq', serif",
                fill: '#ffffff', fontSize: size, hasControls: true, hasBorders: true,
                cornerColor: '#00ffd1', cornerSize: 8, transparentCorners: false
            });
        }
        canvas.add(createSampleText('پہلی لائن (نام)', 80, 26));
        canvas.add(createSampleText('دوسری لائن (کاروبار)', 150, 22));
        canvas.add(createSampleText('تیسری لائن (رابطہ نمبر)', 220, 18));
        canvas.renderAll();

        // 🎯 آبجیکٹ سلیکٹ ہونے پر سمارٹ مینو بدلنے کا سسٹم
        canvas.on('selection:created', updateContextualMenu);
        canvas.on('selection:updated', updateContextualMenu);
        canvas.on('selection:cleared', () => {
            smartMenu.style.display = 'none';
            templatesSection.style.display = 'block';
        });

        canvas.on('object:added', refreshLayers);
        canvas.on('object:removed', refreshLayers);

        function updateContextualMenu() {
            const activeObj = canvas.getActiveObject();
            if (!activeObj) return;

            templatesSection.style.display = 'none';
            smartMenu.style.display = 'flex';

            // اگر ٹیکسٹ سلیکٹ ہوا ہو
            if (activeObj.type === 'text') {
                smartMenu.innerHTML = `
                    <input type="text" class="input-box-active" id="liveTextInp" value="${activeObj.text}">
                    <select class="font-style-active" id="liveFontSel">
                        <option value="'Jameel Noori Nastaleeq', serif">Urdu</option>
                        <option value="Impact">Bold</option>
                        <option value="Montserrat">Modern</option>
                    </select>
                    <div class="color-picker-wrapper context-btn">
                        <i class="fa-solid fa-palette"></i><span>Color</span>
                        <input type="color" class="hidden-color" id="liveColorInp" value="${activeObj.fill}">
                    </div>
                    <button class="context-btn" onclick="deleteSelectedObj()"><i class="fa-solid fa-trash" style="color:#ff7675;"></i><span>Delete</span></button>
                `;

                // لائیو ٹیکسٹ ٹائپنگ کنکشن
                document.getElementById('liveTextInp').addEventListener('input', (e) => {
                    activeObj.set('text', e.target.value);
                    canvas.renderAll();
                });
                document.getElementById('liveFontSel').addEventListener('change', (e) => {
                    activeObj.set('fontFamily', e.target.value);
                    canvas.renderAll();
                });
                document.getElementById('liveColorInp').addEventListener('input', (e) => {
                    activeObj.set('fill', e.target.value);
                    canvas.renderAll();
                });
            } 
            // اگر گیلری کی تصویر سلیکٹ ہوئی ہو
            else if (activeObj.type === 'image') {
                smartMenu.innerHTML = `
                    <button class="context-btn" onclick="smartAIBackgroundRemove()"><i class="fa-solid fa-wand-magic-sparkles"></i><span>BG Remove</span></button>
                    <button class="context-btn" onclick="moveLayerUp()"><i class="fa-solid fa-arrow-up"></i><span>Bring Up</span></button>
                    <button class="context-btn" onclick="moveLayerDown()"><i class="fa-solid fa-arrow-down"></i><span>Send Back</span></button>
                    <button class="context-btn" onclick="deleteSelectedObj()"><i class="fa-solid fa-trash" style="color:#ff7675;"></i><span>Delete</span></button>
                `;
            }
        }

        function addCustomText() {
            canvas.add(createSampleText('نیا ٹیکسٹ لکھیں', 120, 22));
            canvas.renderAll();
        }

        function deleteSelectedObj() {
            const activeObj = canvas.getActiveObject();
            if (activeObj) {
                canvas.remove(activeObj);
                canvas.discardActiveObject();
                canvas.renderAll();
            }
        }

        function moveLayerUp() {
            const activeObj = canvas.getActiveObject();
            if (activeObj) { canvas.bringForward(activeObj); canvas.renderAll(); refreshLayers(); }
        }

        function moveLayerDown() {
            const activeObj = canvas.getActiveObject();
            if (activeObj) { canvas.sendBackwards(activeObj); canvas.renderAll(); refreshLayers(); }
        }

        // 🌟 ایڈوانسڈ فری اسمارٹ بی جی ریموور
        function smartAIBackgroundRemove() {
            const activeObj = canvas.getActiveObject();
            if (!activeObj || activeObj.type !== 'image') return;
            
            // امیج فلٹر کے ذریعے سفید، ہلکے اور چمکیلے بیک گراؤنڈز کو مکمل ریمو کرنا
            const filter = new fabric.Image.filters.RemoveColor({
                threshold: 0.15,
                color: '#ffffff'
            });
            activeObj.filters.push(filter);
            activeObj.applyFilters();
            canvas.renderAll();
            alert("Background Cleared Successfully!");
        }

        // 📁 گیلری سے کسٹمر کی تصویر لانا
        document.getElementById('hidden-photo-loader').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(f) {
                    fabric.Image.fromURL(f.target.result, function(img) {
                        img.scaleToWidth(140);
                        img.set({ left: 100, top: 100, cornerColor: '#00ffd1', cornerSize: 9, transparentCorners: false });
                        canvas.add(img);
                        canvas.setActiveObject(img);
                        canvas.renderAll();
                    });
                }
                reader.readAsDataURL(file);
            }
        });

        // 👁️ لیئرز پینل (Lock / Unlock / Hide / Show) کا نظام
        function toggleLayersPanel() {
            document.getElementById('layersPanel').classList.toggle('active');
            refreshLayers();
        }

        function refreshLayers() {
            const container = document.getElementById('layers-list-container');
            container.innerHTML = "";
            const objects = canvas.getObjects();

            if(objects.length === 0) {
                container.innerHTML = "<p style='font-size:10px; color:#555;'>No layers active</p>";
                return;
            }

            objects.forEach((obj, index) => {
                const name = obj.type === 'text' ? `Text: ${obj.text.substring(0,10)}` : `Photo Layer ${index+1}`;
                const isLocked = !obj.selectable;
                const isHidden = !obj.visible;

                const row = document.createElement('div');
                row.className = 'layer-item';
                row.innerHTML = `
                    <span>${name}</span>
                    <div class="layer-controls">
                        <button class="layer-icon-btn ${isHidden ? 'active' : ''}" onclick="toggleHideLayer(${index})"><i class="fa-solid ${isHidden ? 'fa-eye-slash' : 'fa-eye'}"></i></button>
                        <button class="layer-icon-btn ${isLocked ? 'active' : ''}" onclick="toggleLockLayer(${index})"><i class="fa-solid ${isLocked ? 'fa-lock' : 'fa-lock-open'}"></i></button>
                    </div>
                `;
                container.prepend(row); // تازہ ترین اوپر دکھانے کے لیے
            });
        }

        function toggleLockLayer(index) {
            const obj = canvas.item(index);
            if (obj) {
                obj.selectable = !obj.selectable;
                obj.hasControls = obj.selectable;
                canvas.discardActiveObject();
                canvas.renderAll();
                refreshLayers();
            }
        }

        function toggleHideLayer(index) {
            const obj = canvas.item(index);
            if (obj) {
                obj.visible = !obj.visible;
                canvas.discardActiveObject();
                canvas.renderAll();
                refreshLayers();
            }
        }

        // 🔗 فائر بیس سرور سے ایڈمن کے اپلوڈ کردہ ٹیمپلیٹس لائیو لوڈ کرنا
        const templatesRow = document.getElementById('firebase-templates');
        database.ref('templates').on('value', (snapshot) => {
            templatesRow.innerHTML = "";
            if(snapshot.exists()){
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    const card = document.createElement('div');
                    card.className = 'template-card';
                    card.style.backgroundImage = `url('${data.imageUrl}')`;
                    card.onclick = () => {
                        fabric.Image.fromURL(data.imageUrl, function(img) {
                            img.set({ scaleX: canvas.width / img.width, scaleY: canvas.height / img.height });
                            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                        }, { crossOrigin: 'anonymous' });
                    };
                    templatesRow.appendChild(card);
                });
            } else {
                templatesRow.innerHTML = "<p style='font-size:11px; color:#555; padding-top:20px;'>No online frames.</p>";
            }
        });

        function downloadMasterImage() {
            canvas.discardActiveObject();
            canvas.renderAll();
            setTimeout(() => {
                const dataURL = canvas.toDataURL({ format: 'png', quality: 1.0, multiplier: 3 });
                const link = document.createElement('a');
                link.download = 'Huzaifa_Graphics_Design.png';
                link.href = dataURL;
                link.click();
            }, 100);
        }
    </script>
</body>
</html>
